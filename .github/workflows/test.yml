name: Tester

# Kort tittel per kjøring så den er lesbar på mobil:
# PR-kjøringer viser kun «PR #28» (GitHub viser dato/klokke ved siden av).
# Push til main viser commit-meldingen — merge-commits starter med «Merge pull request #28».
run-name: "${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event.head_commit.message }}"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test, typecheck og build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # --legacy-peer-deps: lockfilen har en kjent peer-konflikt
      # (vite 8 vs @vitejs/plugin-react-swc 3) — Lovable bygger med bun
      - name: Installer avhengigheter
        run: npm install --legacy-peer-deps

      - name: Kjør tester
        run: npm test

      - name: TypeScript-sjekk
        run: npx tsc --noEmit

      - name: Produksjonsbygg
        run: npm run build
